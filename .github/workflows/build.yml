name: Build Polar Doctor

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

# Nécessaire pour que softprops/action-gh-release puisse créer la release
permissions:
  contents: write

jobs:
  build-linux:
    name: Build on Linux
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libgtk-3-dev libsqlite3-dev pkg-config

    - name: Build
      run: |
        gcc -o polar_doctor *.c \
          `pkg-config --cflags --libs gtk+-3.0` \
          -lm -lsqlite3 -Wall -O2

    - name: Set executable permissions
      run: chmod +x polar_doctor

    - name: Test binary
      run: |
        # Ne pas exécuter : appli GUI sans flag --version, gtk_main() bloque
        # (sur macOS le backend quartz ne sort pas faute de display -> hang).
        file polar_doctor
        test -x polar_doctor

    - name: Create package
      run: |
        mkdir -p dist
        tar -czf dist/polar_doctor-linux-x64.tar.gz \
          polar_doctor \
          polar_doctor.png \
          polar_doctor.svg \
          polar_doctor.desktop \
          README.md \
          BUILD.md

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: polar_doctor-linux-x64
        path: dist/polar_doctor-linux-x64.tar.gz
        retention-days: 30

  build-linux-arm64:
    name: Build on Linux ARM64
    runs-on: ubuntu-latest
    # Build QEMU lent/fragile : ne doit pas bloquer la release. Borné dans le temps
    # et toléré en échec (les autres plateformes et la release continuent).
    timeout-minutes: 60
    continue-on-error: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up QEMU for ARM64
      uses: docker/setup-qemu-action@v4
      with:
        platforms: arm64

    - name: Build in ARM64 container
      run: |
        docker run --rm --platform linux/arm64 \
          -v ${{ github.workspace }}:/workspace \
          -w /workspace \
          arm64v8/ubuntu:22.04 \
          bash -c "
            export DEBIAN_FRONTEND=noninteractive && \
            apt-get update && \
            apt-get install -y build-essential libgtk-3-dev libsqlite3-dev pkg-config && \
            gcc -o polar_doctor *.c \
              \$(pkg-config --cflags --libs gtk+-3.0) \
              -lm -lsqlite3 -Wall -O2 && \
            chmod +x polar_doctor
          "

    - name: Verify binary architecture
      run: |
        file polar_doctor
        readelf -h polar_doctor | grep Machine || true

    - name: Create package
      run: |
        mkdir -p dist
        tar -czf dist/polar_doctor-linux-arm64.tar.gz \
          polar_doctor \
          polar_doctor.png \
          polar_doctor.svg \
          polar_doctor.desktop \
          README.md \
          BUILD.md

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: polar_doctor-linux-arm64
        path: dist/polar_doctor-linux-arm64.tar.gz
        retention-days: 30

  # macOS : Apple Silicon uniquement (les runners Intel macos-13 ne sont plus
  # disponibles). Les Mac Intel compilent depuis les sources (voir BUILD.md).
  build-macos:
    name: Build on macOS (Apple Silicon)
    runs-on: macos-14
    timeout-minutes: 40
    continue-on-error: true
    steps:
    - name: Checkout code
      uses: actions/checkout@v6
    - name: Install dependencies
      run: brew install gtk+3 sqlite pkg-config
    - name: Build (arm64)
      run: |
        gcc -arch arm64 -o polar_doctor *.c \
          `pkg-config --cflags --libs gtk+-3.0` \
          -lm -lsqlite3 -Wall -O2
        file polar_doctor
        test -x polar_doctor
    - name: Create package
      run: |
        mkdir -p dist
        tar -czf dist/polar_doctor-macos-arm64.tar.gz \
          polar_doctor \
          polar_doctor.png \
          polar_doctor.svg \
          README.md \
          BUILD.md
    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: polar_doctor-macos-arm64
        path: dist/polar_doctor-macos-arm64.tar.gz
        retention-days: 30

  build-windows:
    name: Build on Windows
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup MSYS2
      uses: msys2/setup-msys2@v2
      with:
        msystem: MINGW64
        update: true
        install: >-
          mingw-w64-x86_64-gcc
          mingw-w64-x86_64-gtk3
          mingw-w64-x86_64-sqlite3
          mingw-w64-x86_64-pkg-config
          zip

    - name: Build
      run: |
        gcc -o polar_doctor.exe *.c \
          `pkg-config --cflags --libs gtk+-3.0` \
          -lm -lsqlite3 -mwindows -D_WIN32 -Wall -O2

    - name: Create portable package
      run: |
        mkdir -p polar_doctor_win
        cp polar_doctor.exe polar_doctor_win/
        cp polar_doctor.png polar_doctor_win/
        cp polar_doctor.svg polar_doctor_win/
        cp README.md polar_doctor_win/
        cp BUILD.md polar_doctor_win/

        # Copy all required DLLs with multiple passes
        echo "Copying DLLs - Pass 1 (from exe)"
        ldd polar_doctor.exe | grep mingw64 | awk '{print $3}' | xargs -I {} cp {} polar_doctor_win/ 2>/dev/null || true

        # Additional passes to catch transitive dependencies
        echo "Copying DLLs - Pass 2"
        for dll in polar_doctor_win/*.dll; do [ -f "$dll" ] && ldd "$dll" 2>/dev/null | grep mingw64 | awk '{print $3}' | xargs -I {} cp {} polar_doctor_win/ 2>/dev/null || true; done

        echo "Copying DLLs - Pass 3"
        for dll in polar_doctor_win/*.dll; do [ -f "$dll" ] && ldd "$dll" 2>/dev/null | grep mingw64 | awk '{print $3}' | xargs -I {} cp {} polar_doctor_win/ 2>/dev/null || true; done

        echo "Copying DLLs - Pass 4"
        for dll in polar_doctor_win/*.dll; do [ -f "$dll" ] && ldd "$dll" 2>/dev/null | grep mingw64 | awk '{print $3}' | xargs -I {} cp {} polar_doctor_win/ 2>/dev/null || true; done

        # Copy GTK runtime files
        mkdir -p polar_doctor_win/share/glib-2.0
        mkdir -p polar_doctor_win/share/icons
        mkdir -p polar_doctor_win/lib/gdk-pixbuf-2.0

        cp -r /mingw64/share/glib-2.0/schemas polar_doctor_win/share/glib-2.0/ || true
        cp -r /mingw64/share/icons/Adwaita polar_doctor_win/share/icons/ || true
        cp -r /mingw64/lib/gdk-pixbuf-2.0/2.10.0 polar_doctor_win/lib/gdk-pixbuf-2.0/ || true

        # Dépendances des loaders gdk-pixbuf : ils sont chargés DYNAMIQUEMENT, donc
        # invisibles à `ldd polar_doctor.exe`. Sans elles (notamment librsvg-2-2.dll
        # + libxml2… pour le loader SVG), GTK fait un abort fatal au démarrage en
        # chargeant l'icône SVG du thème Adwaita. On copie les deps de chaque loader.
        echo "Copying gdk-pixbuf loader dependencies (librsvg, etc.)"
        for dll in polar_doctor_win/lib/gdk-pixbuf-2.0/2.10.0/loaders/*.dll; do
          [ -f "$dll" ] && ldd "$dll" 2>/dev/null | grep mingw64 | awk '{print $3}' | xargs -I {} cp -u {} polar_doctor_win/ 2>/dev/null || true
        done
        # Passes transitives (ex. librsvg -> libxml2 ; déjà copiées -> deps de deps)
        for i in 1 2 3; do
          for dll in polar_doctor_win/*.dll; do [ -f "$dll" ] && ldd "$dll" 2>/dev/null | grep mingw64 | awk '{print $3}' | xargs -I {} cp -u {} polar_doctor_win/ 2>/dev/null || true; done
        done

        # Schémas GSettings compilés (requis par le sélecteur de fichiers)
        glib-compile-schemas polar_doctor_win/share/glib-2.0/schemas || true

        # Helper gdbus (spawné à l'exécution par GIO, non listé par ldd)
        cp /mingw64/bin/gdbus.exe polar_doctor_win/ 2>/dev/null || true

        # List all copied DLLs for debugging
        echo "Copied DLLs:"
        ls -lh polar_doctor_win/*.dll

        # Create README for Windows
        cat > polar_doctor_win/LISEZMOI.txt << 'EOF'
        Polar Doctor - Version Windows
        ===============================

        Pour lancer:
        - Double-cliquer sur polar_doctor.exe

        Note: Cette version utilise des dialogues de fichiers natifs Windows
        pour une meilleure stabilité.

        Si une erreur apparaît:
        - Assurez-vous que tous les fichiers .dll sont présents
        - Lancez depuis l'invite de commande pour voir les erreurs détaillées

        Documentation complète: README.md
        EOF

    - name: Upload artifact
      uses: actions/upload-artifact@v7
      with:
        name: polar_doctor-windows-x64
        path: polar_doctor_win/
        retention-days: 30

  create-release:
    name: Create Release
    needs: [build-linux, build-linux-arm64, build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Download Linux artifact
      uses: actions/download-artifact@v8
      with:
        name: polar_doctor-linux-x64
        path: ./artifacts

    - name: Download Linux ARM64 artifact
      uses: actions/download-artifact@v8
      continue-on-error: true  # ARM64 peut avoir échoué : ne bloque pas la release
      with:
        name: polar_doctor-linux-arm64
        path: ./artifacts

    - name: Download macOS artifact
      uses: actions/download-artifact@v8
      continue-on-error: true  # macOS peut avoir échoué/timeout : ne bloque pas la release
      with:
        name: polar_doctor-macos-arm64
        path: ./artifacts

    - name: Download Windows artifact
      uses: actions/download-artifact@v8
      with:
        name: polar_doctor-windows-x64
        path: ./polar_doctor_win

    - name: Create Windows zip
      run: |
        mkdir -p artifacts
        zip -r artifacts/polar_doctor-windows-x64.zip polar_doctor_win/

    - name: Generate checksums
      run: |
        cd artifacts
        # Ne checksummer que les artefacts réellement présents (ARM64 peut manquer)
        for f in polar_doctor-linux-x64.tar.gz polar_doctor-linux-arm64.tar.gz \
                 polar_doctor-macos-arm64.tar.gz polar_doctor-windows-x64.zip; do
          [ -f "$f" ] && sha256sum "$f" > "$f.sha256"
        done
        sha256sum *.tar.gz *.zip 2>/dev/null > SHA256SUMS.txt || true
        cat SHA256SUMS.txt

    - name: Create Release
      uses: softprops/action-gh-release@v3
      with:
        files: |
          artifacts/polar_doctor-linux-x64.tar.gz
          artifacts/polar_doctor-linux-x64.tar.gz.sha256
          artifacts/polar_doctor-linux-arm64.tar.gz
          artifacts/polar_doctor-linux-arm64.tar.gz.sha256
          artifacts/polar_doctor-macos-arm64.tar.gz
          artifacts/polar_doctor-macos-arm64.tar.gz.sha256
          artifacts/polar_doctor-windows-x64.zip
          artifacts/polar_doctor-windows-x64.zip.sha256
          artifacts/SHA256SUMS.txt
        body: |
          # Polar Doctor ${{ github.ref_name }}

          ## 📦 Installation

          ### Linux x86_64 (PC standard)
          ```bash
          tar -xzf polar_doctor-linux-x64.tar.gz
          ./polar_doctor
          ```

          ### Linux ARM64 (Raspberry Pi, serveurs ARM)
          ```bash
          tar -xzf polar_doctor-linux-arm64.tar.gz
          ./polar_doctor
          ```

          ### macOS (Apple Silicon / arm64)
          ```bash
          tar -xzf polar_doctor-macos-arm64.tar.gz
          ./polar_doctor
          ```

          Note: You may need to install GTK+3: `brew install gtk+3`

          ### Windows
          1. Extraire `polar_doctor-windows-x64.zip`
          2. Double-cliquer sur `polar_doctor.exe`

          ## 🔐 Vérification des fichiers

          Pour vérifier l'intégrité des téléchargements :
          ```bash
          sha256sum -c polar_doctor-linux-x64.tar.gz.sha256
          sha256sum -c polar_doctor-linux-arm64.tar.gz.sha256
          sha256sum -c polar_doctor-macos-arm64.tar.gz.sha256
          sha256sum -c polar_doctor-windows-x64.zip.sha256
          ```

          Ou consultez le fichier `SHA256SUMS.txt` pour tous les checksums.

          ## 📝 Changelog

          Voir les commits pour les détails des changements.

          ## 🐛 Bugs

          Signalez les bugs sur https://github.com/${{ github.repository }}/issues
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
