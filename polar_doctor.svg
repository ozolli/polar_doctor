<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="128" cy="128" r="120" fill="#1e40af" stroke="#1e3a8a" stroke-width="4"/>

  <!-- Polar diagram grid (concentric circles) -->
  <g stroke="#60a5fa" stroke-width="1.5" fill="none" opacity="0.6">
    <circle cx="128" cy="128" r="30"/>
    <circle cx="128" cy="128" r="50"/>
    <circle cx="128" cy="128" r="70"/>
    <circle cx="128" cy="128" r="90"/>
  </g>

  <!-- Radial lines (angles) -->
  <g stroke="#60a5fa" stroke-width="1.5" opacity="0.6">
    <line x1="128" y1="128" x2="128" y2="38"/>
    <line x1="128" y1="128" x2="192" y2="64"/>
    <line x1="128" y1="128" x2="218" y2="128"/>
    <line x1="128" y1="128" x2="192" y2="192"/>
    <line x1="128" y1="128" x2="128" y2="218"/>
    <line x1="128" y1="128" x2="64" y2="192"/>
    <line x1="128" y1="128" x2="38" y2="128"/>
    <line x1="128" y1="128" x2="64" y2="64"/>
  </g>

  <!-- Polar curve (example performance curve) -->
  <path d="M 128 48
           Q 160 55, 180 75
           Q 195 95, 205 120
           Q 210 145, 205 170
           Q 195 190, 175 202
           Q 150 215, 128 218
           Q 105 215, 80 202
           Q 60 190, 50 170
           Q 45 145, 50 120
           Q 60 95, 75 75
           Q 95 55, 128 48 Z"
        fill="#3b82f6" opacity="0.4" stroke="#60a5fa" stroke-width="2"/>

  <!-- Sailboat silhouette in center -->
  <g transform="translate(128, 128)">
    <!-- Hull -->
    <path d="M -15 20 Q 0 25, 15 20 L 10 -5 L -10 -5 Z"
          fill="#ffffff" stroke="#e5e7eb" stroke-width="1.5"/>

    <!-- Mast -->
    <line x1="0" y1="-5" x2="0" y2="-45"
          stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

    <!-- Main sail -->
    <path d="M 0 -45 L 25 -10 L 0 -5 Z"
          fill="#f8fafc" opacity="0.9" stroke="#cbd5e1" stroke-width="1"/>

    <!-- Jib -->
    <path d="M 0 -40 L -20 -15 L 0 -10 Z"
          fill="#e0f2fe" opacity="0.8" stroke="#bae6fd" stroke-width="1"/>
  </g>

  <!-- Medical cross (Doctor reference) -->
  <g transform="translate(200, 56)" opacity="0.9">
    <circle cx="0" cy="0" r="22" fill="#ffffff"/>
    <rect x="-3" y="-14" width="6" height="28" fill="#ef4444" rx="1"/>
    <rect x="-14" y="-3" width="28" height="6" fill="#ef4444" rx="1"/>
  </g>

  <!-- Wind arrow -->
  <g transform="translate(40, 60)">
    <path d="M 0 0 L 0 -30 L 8 -22 M 0 -30 L -8 -22"
          stroke="#fbbf24" stroke-width="3" stroke-linecap="round"
          stroke-linejoin="round" fill="none"/>
    <text x="15" y="-10" font-family="Arial, sans-serif" font-size="14"
          fill="#fbbf24" font-weight="bold">TWS</text>
  </g>

  <!-- Border -->
  <circle cx="128" cy="128" r="120" fill="none" stroke="#1e3a8a" stroke-width="3"/>
</svg>
